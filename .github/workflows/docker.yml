name: Docker

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Set env vars
      run: |
        echo DOCKER_PUSH=$([[ $GITHUB_REF == *"master"* ]] && echo "true" || echo "false") >> $GITHUB_ENV
        echo VERSION_NUMBER=$(jq -r < package.json .version) >> $GITHUB_ENV
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        echo NODE_ENV=production >> $GITHUB_ENV
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker build
      uses: docker/build-push-action@v6
      with:
        tags: ghcr.io/maxcanna/raiapi:latest,ghcr.io/maxcanna/raiapi:${{ env.VERSION_NUMBER }}
        push: ${{ env.DOCKER_PUSH }}
        platforms: ${{ env.DOCKER_PUSH == 'true' && 'linux/amd64,linux/arm64,linux/arm/v7 || 'linux/amd64' }}
        context: .
        build-args: |
          BUILD_DATE=${{ env.BUILD_DATE }}
          REVISION=${{ github.sha }}
          VERSION=${{ env.VERSION_NUMBER }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
