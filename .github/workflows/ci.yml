name: CI

on:
  push:
    branches-ignore:
      - 'master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fixups:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Check if there are fixup commits
      run: git log --pretty=format:%s origin/master.. | xargs | grep -v fixup
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bump
        run: git diff --diff-filter=M origin/master -- "package.json" | grep "version"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint FE
        run: yarn lint
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Lint BE
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:4-bionic
        ports:
          - 27017/tcp
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Enable Corepack
      run: corepack enable
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'yarn'
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    - name: Install dependencies
      run: yarn install --immutable
    - name: Build Frontend
      run: yarn build
    - name: Build Backend
      run: go build -v -o raiapi ./cmd/server
    - name: Run tests with mongodb cache empty
      env:
        MONGO_URL: mongodb://localhost:${{ job.services.mongo.ports['27017'] }}/raiapi-test
      run: go test -v ./...
    - name: Run tests with mongodb cache full
      env:
        MONGO_URL: mongodb://localhost:${{ job.services.mongo.ports['27017'] }}/raiapi-test
      run: go test -v ./...
    - name: Run tests with mongodb cache not available
      run: go test -v ./...
